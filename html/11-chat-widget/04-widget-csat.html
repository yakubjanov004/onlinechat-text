<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QULAY CHAT - Widget CSAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/qulay-chat-design-system.css" />
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="../assets/qulay-chat-runtime.js" defer></script>
    <script src="../assets/widget-interactions.js" defer></script>
  </head>
  <body class="widget-page">
    <main class="widget-page">
      <div class="widget-shell">
        <div class="widget-topbar" style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface,#fff);border-bottom:1px solid var(--border,#e5e7eb);">
          <a href="../04-dashboard/01-dashboard.html" class="btn btn-ghost btn-sm">
            <i data-lucide="arrow-left"></i> Dashboard
          </a>
          <nav class="subnav-tabs" style="border:0;margin:0;padding:0;">
            <a class="tab" href="./01-widget-launcher.html">Launcher</a>
            <a class="tab" href="./02-widget-chat.html">Chat</a>
            <a class="tab" href="./03-widget-offline.html">Offline</a>
            <a class="tab active" href="./04-widget-csat.html">CSAT</a>
            <a class="tab" href="./05-widget-states.html">Holatlar</a>
            <a class="tab" href="./06-widget-prechat.html">Pre-chat</a>
            <a class="tab" href="./07-widget-knowledge.html">KB</a>
            <a class="tab" href="./08-widget-mobile.html">Mobile</a>
          </nav>
        </div>
        <div class="widget-canvas">
          <div class="widget-site-content">
            <div class="card">
              <div class="card-header">
                <div>
                  <h3>CSAT prompt</h3>
                  <p class="card-description">
                    Suhbatdan keyin baholash oynasi
                  </p>
                </div>
              </div>
              <div class="card-body">
                <div class="placeholder-line" style="width: 90%"></div>
                <div class="placeholder-line" style="width: 80%"></div>
                <div
                  class="placeholder-line"
                  style="width: 95%; height: 180px; border-radius: 14px"
                ></div>
              </div>
            </div>
            <div style="justify-self: end">
              <div class="widget-window">
                <div class="widget-window-header">
                  <div>
                    <strong>QULAY CHAT</strong>
                    <div class="mini">CSAT</div>
                  </div>
                  <button class="icon-btn" type="button" data-action="log">
                    <i data-lucide="x"></i>
                  </button>
                </div>
                <div class="widget-window-body">
                  <h3>Yordamingiz foydali bo'ldimi?</h3>
                  <div class="text-muted" style="font-size: 13px">
                    Suhbat sifatini 1 dan 5 gacha baholang.
                  </div>
                  <div class="flex gap-2" data-star-rating data-value="0">
                    <button
                      class="btn btn-secondary btn-sm"
                      type="button"
                      data-star-value="1"
                    >
                      <i data-lucide="star"></i>
                    </button>
                    <button
                      class="btn btn-secondary btn-sm"
                      type="button"
                      data-star-value="2"
                    >
                      <i data-lucide="star"></i>
                    </button>
                    <button
                      class="btn btn-secondary btn-sm"
                      type="button"
                      data-star-value="3"
                    >
                      <i data-lucide="star"></i>
                    </button>
                    <button
                      class="btn btn-secondary btn-sm"
                      type="button"
                      data-star-value="4"
                    >
                      <i data-lucide="star"></i>
                    </button>
                    <button
                      class="btn btn-secondary btn-sm"
                      type="button"
                      data-star-value="5"
                    >
                      <i data-lucide="star"></i>
                    </button>
                  </div>
                  <label class="form-field">
                    <span class="form-label">Izoh</span>
                    <textarea
                      class="textarea"
                      rows="4"
                      placeholder="Qo'shimcha fikringiz..."
                    ></textarea>
                  </label>
                </div>
                <div class="widget-window-footer">
                  <button
                    class="btn btn-primary w-full"
                    type="button"
                    data-action="log"
                  >
                    Yuborish
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;padding:16px;border-top:1px solid var(--border, #e5e7eb);">
          <a class="btn btn-ghost btn-sm" href="../09-settings/02-widget-settings.html"><i data-lucide="settings"></i> Widget sozlamalari</a>
          <a class="btn btn-ghost btn-sm" href="../03-onboarding/05-widget-install.html"><i data-lucide="code"></i> Install kodi</a>
          <a class="btn btn-ghost btn-sm" href="../03-onboarding/04-widget-customize.html"><i data-lucide="palette"></i> Customization</a>
          <a class="btn btn-ghost btn-sm" href="../04-dashboard/01-dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        </div>
    </main>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        if (window.lucide && window.lucide.createIcons) {
          window.lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
