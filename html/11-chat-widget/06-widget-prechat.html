<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QULAY CHAT - Widget Pre-chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/qulay-chat-design-system.css" />
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="../assets/qulay-chat-runtime.js" defer></script>
    <script src="../assets/widget-extensions.js" defer></script>
  </head>
  <body class="widget-page">
    <main class="widget-page">
      <div class="widget-shell">
        <div class="widget-topbar" style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface,#fff);border-bottom:1px solid var(--border,#e5e7eb);">
          <a href="../04-dashboard/01-dashboard.html" class="btn btn-ghost btn-sm">
            <i data-lucide="arrow-left"></i> Dashboard
          </a>
          <nav class="subnav-tabs" style="border:0;margin:0;padding:0;">
            <a class="tab" href="./01-widget-launcher.html">Launcher</a>
            <a class="tab" href="./02-widget-chat.html">Chat</a>
            <a class="tab" href="./03-widget-offline.html">Offline</a>
            <a class="tab" href="./04-widget-csat.html">CSAT</a>
            <a class="tab" href="./05-widget-states.html">Holatlar</a>
            <a class="tab active" href="./06-widget-prechat.html">Pre-chat</a>
            <a class="tab" href="./07-widget-knowledge.html">KB</a>
            <a class="tab" href="./08-widget-mobile.html">Mobile</a>
          </nav>
        </div>
        <div class="widget-canvas">
          <div class="widget-site-content">
            <div class="card">
              <div class="card-header">
                <div>
                  <h3>Pre-chat form</h3>
                  <p class="card-description">
                    Visitordan ism/email/bo‘limni oldindan yig‘ish
                  </p>
                </div>
              </div>
              <div class="card-body">
                <div class="grid cols-2">
                  <label class="field"
                    ><span class="label">Form mode</span
                    ><select class="select">
                      <option>Required fields</option>
                      <option>Optional fields</option>
                    </select></label
                  >
                  <label class="field"
                    ><span class="label">Routing</span
                    ><select class="select">
                      <option>Department</option>
                      <option>Round robin</option>
                    </select></label
                  >
                </div>
              </div>
            </div>
            <div data-widget-demo class="is-open" style="justify-self: end">
              <div class="widget-window">
                <div class="widget-window-header">
                  <div>
                    <strong>QULAY CHAT</strong>
                    <div class="mini">
                      Suhbatni boshlash uchun formani to‘ldiring
                    </div>
                  </div>
                </div>
                <div class="widget-window-body">
                  <label class="field"
                    ><span class="label">Ismingiz *</span
                    ><input
                      class="input"
                      type="text"
                      placeholder="Masalan: Aziza"
                      data-prechat-name
                  /></label>
                  <label class="field"
                    ><span class="label">Email *</span
                    ><input
                      class="input"
                      type="email"
                      placeholder="you@example.com"
                      data-prechat-email
                  /></label>
                  <label class="field"
                    ><span class="label">Savol turi</span
                    ><select class="select" data-prechat-topic>
                      <option value="sales">Sales</option>
                      <option value="support">Support</option>
                      <option value="billing">Billing</option>
                    </select></label
                  >
                  <label class="field"
                    ><span class="label">Xabar *</span
                    ><textarea
                      class="textarea"
                      rows="3"
                      placeholder="Qanday yordam kerak?"
                      data-prechat-message
                    ></textarea>
                  </label>
                  <label style="font-size: 12px; color: var(--text-muted)"
                    ><input type="checkbox" checked data-prechat-consent />
                    Shaxsiy ma’lumotlarni qayta ishlashga roziman</label
                  >
                </div>
                <div class="widget-window-footer">
                  <button
                    class="btn btn-primary"
                    type="button"
                    data-prechat-start
                  >
                    Suhbatni boshlash
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;padding:16px;border-top:1px solid var(--border, #e5e7eb);">
          <a class="btn btn-ghost btn-sm" href="../09-settings/02-widget-settings.html"><i data-lucide="settings"></i> Widget sozlamalari</a>
          <a class="btn btn-ghost btn-sm" href="../03-onboarding/05-widget-install.html"><i data-lucide="code"></i> Install kodi</a>
          <a class="btn btn-ghost btn-sm" href="../03-onboarding/04-widget-customize.html"><i data-lucide="palette"></i> Customization</a>
          <a class="btn btn-ghost btn-sm" href="../04-dashboard/01-dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        </div>
    </main>
    <script>
      window.addEventListener(
        "DOMContentLoaded",
        () =>
          window.lucide &&
          window.lucide.createIcons &&
          window.lucide.createIcons(),
      );
    </script>
  </body>
</html>
